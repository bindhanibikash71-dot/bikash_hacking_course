<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Course Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .course-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .course-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <span>🎓 Course Store</span>
    <div id="navLinks">
        <a href="admin.html">Admin Login</a>
    </div>
</header>

<div class="container">
    <!-- Login Form -->
    <div id="loginSection">
        <h2>Login to Buy Courses</h2>
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
        <button style="background:#007bff" onclick="register()">Register New Account</button>
    </div>

    <!-- Course List -->
    <div id="courseSection" class="hidden">
        <h2>Welcome, <span id="userName"></span></h2>
        <button style="background:#dc3545; width:auto;" onclick="logout()">Logout</button>
        <hr>
        <h3>Available Courses:</h3>
        <div id="courseList">Loading...</div>
    </div>
</div>

<script>
    // --- 1. YOUR FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyA-s334SmkKcFa9Y2exA8rFvYyHfwpk_kk",
        authDomain: "mycourse-5e043.firebaseapp.com",
        databaseURL: "https://mycourse-5e043-default-rtdb.firebaseio.com",
        projectId: "mycourse-5e043",
        storageBucket: "mycourse-5e043.firebasestorage.app",
        messagingSenderId: "443359135204",
        appId: "1:443359135204:web:b4758a8da8d6efe60a33f1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // --- 2. RAZORPAY KEY (Yahan apni Key ID dalna) ---
    const RAZORPAY_KEY = "rzp_test_YOUR_KEY_ID"; 

    // --- AUTH LOGIC ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('courseSection').classList.remove('hidden');
            document.getElementById('userName').innerText = user.email;
            loadCourses();
        } else {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('courseSection').classList.add('hidden');
        }
    });

    function register() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.createUserWithEmailAndPassword(e, p)
            .then(() => alert("Account Created! Please Login."))
            .catch(err => alert(err.message));
    }

    function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p)
            .catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); }

    // --- LOAD COURSES ---
    async function loadCourses() {
        const list = document.getElementById('courseList');
        list.innerHTML = "";
        const snap = await db.collection('courses').get();
        
        if(snap.empty) { list.innerHTML = "<p>No courses available yet.</p>"; return; }

        snap.forEach(doc => {
            const d = doc.data();
            list.innerHTML += `
                <div class="course-card">
                    <img src="${d.imageUrl}">
                    <h3>${d.title}</h3>
                    <p>${d.description}</p>
                    <p><strong>Price: ₹${d.price}</strong></p>
                    <button onclick="buyCourse('${doc.id}', ${d.price})">Buy Now</button>
                </div>
            `;
        });
    }

    // --- PAYMENT ---
    function buyCourse(id, price) {
        var options = {
            "key": RAZORPAY_KEY,
            "amount": price * 100,
            "currency": "INR",
            "name": "Course Store",
            "handler": function (response){
                alert("Payment Successful! ID: " + response.razorpay_payment_id);
            }
        };
        new Razorpay(options).open();
    }
</script>
</body>
</html>
